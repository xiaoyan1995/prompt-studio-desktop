name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install pyinstaller

      - name: Install Node deps
        run: npm install
        working-directory: desktop

      - name: Compile Python server
        run: python -m PyInstaller --clean --noconfirm server-build/prompt-studio-server.spec --distpath server-dist
        working-directory: desktop

      - name: Build Electron (Windows)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win
        working-directory: desktop

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop/dist/*.exe
            desktop/dist/*.zip
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install pyinstaller

      - name: Install Node deps
        run: npm install
        working-directory: desktop

      - name: Compile Python server
        run: python -m PyInstaller --clean --noconfirm server-build/prompt-studio-server.spec --distpath server-dist
        working-directory: desktop

      - name: Generate icns icon
        run: |
          if [ -f "build/icon.png" ] && [ ! -f "build/icon.icns" ]; then
            ICONSET="build/icon.iconset"
            mkdir -p "$ICONSET"
            sips -z 16 16     build/icon.png --out "$ICONSET/icon_16x16.png"
            sips -z 32 32     build/icon.png --out "$ICONSET/icon_16x16@2x.png"
            sips -z 128 128   build/icon.png --out "$ICONSET/icon_128x128.png"
            sips -z 256 256   build/icon.png --out "$ICONSET/icon_256x256.png"
            sips -z 512 512   build/icon.png --out "$ICONSET/icon_512x512.png"
            sips -z 1024 1024 build/icon.png --out "$ICONSET/icon_512x512@2x.png"
            iconutil -c icns "$ICONSET" -o build/icon.icns
          fi
        working-directory: desktop

      - name: Build Electron (macOS)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac -- --publish never
        working-directory: desktop

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/*
            artifacts/macos/*
          generate_release_notes: true
